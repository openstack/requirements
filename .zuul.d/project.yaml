- project:
    templates:
      - openstack-python3-jobs
    check:
      jobs:
        - build-wheel-cache-ubuntu-focal:
            files:
              - bindep.txt
        - build-wheel-cache-ubuntu-jammy:
            files:
              - bindep.txt
        - openstack-tox-validate
        - requirements-check-self
        - requirements-tox-babel
        - requirements-tox-bindep:
            voting: false
        - requirements-tox-py310-check-uc
        - requirements-tox-py311-check-uc
        - requirements-tox-py312-check-uc
        - requirements-tox-py313-check-uc
        - requirements-tox-validate-projects:
            voting: false
        - cross-aodh-py313
        - cross-barbican-py313
        - cross-ceilometer-py313
        - cross-cinder-py313
        - cross-designate-py313
        - cross-glance-py313
        - cross-heat-py313
        - cross-horizon-py313
        - cross-horizon-npm
        - cross-ironic-py313
        - cross-keystone-py313
        - cross-kuryr-py313
        - cross-manila-py313
        - cross-magnum-py313
        - cross-masakari-py313:
            voting: false
        - cross-mistral-py313:
            voting: false
        - cross-neutron-py313
        - cross-nova-pep8
        - cross-nova-py313
        - cross-placement-py313
        - cross-osvif-py3
        - cross-nova-functional
        - cross-placement-functional-py313
        - cross-octavia-py313
        - cross-osc-tox-docs
        - cross-swift-py313
        - cross-watcher-py3
        - openstacksdk-functional-devstack
        - tempest-full-py3:
            irrelevant-files:
              - ^bindep.txt$
              - ^(test-|)requirements.txt$
              - ^setup.cfg$
    check-arm64:
      jobs:
        - build-wheel-cache-ubuntu-focal-arm64:
            files:
              - bindep.txt
        - build-wheel-cache-ubuntu-jammy-arm64:
            files:
              - bindep.txt
    gate:
      jobs:
        - build-wheel-cache-ubuntu-focal:
            files:
              - bindep.txt
        - build-wheel-cache-ubuntu-jammy:
            files:
              - bindep.txt
        - openstack-tox-validate
        - requirements-check-self
        - requirements-tox-babel
        - requirements-tox-py310-check-uc
        - requirements-tox-py311-check-uc
        - requirements-tox-py312-check-uc
        - requirements-tox-py313-check-uc
        - cross-cinder-py313
        - cross-designate-py313
        - cross-glance-py313
        - cross-heat-py313
        - cross-horizon-py313
        - cross-horizon-npm
        - cross-ironic-py313
        - cross-keystone-py313
        - cross-kuryr-py313
        - cross-manila-py313
        - cross-neutron-py313
        - cross-nova-pep8
        - cross-nova-py313:
            files: ^upper-constraints.txt$
        - cross-placement-py313:
            files: ^upper-constraints.txt$
        - cross-osvif-py3
        - cross-nova-functional
        - cross-placement-functional-py313
        - cross-octavia-py313
        - cross-osc-tox-docs
        - cross-swift-py313
        - cross-watcher-py3
        - openstacksdk-functional-devstack
        - tempest-full-py3:
            irrelevant-files:
              - ^bindep.txt$
              - ^(test-|)requirements.txt$
              - ^setup.cfg$
    experimental:
      jobs:
        - nova-ceph-multistore
        - nova-next
        - requirements-tox-py310-check-uc-no-wheels
        - requirements-tox-py311-check-uc-no-wheels
        - requirements-tox-py312-check-uc-no-wheels
        - tempest-integrated-storage
        - tempest-pg-full:
            irrelevant-files:
              - ^(test-|)requirements.txt$
              - ^setup.cfg$
